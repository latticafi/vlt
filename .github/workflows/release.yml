name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  ci:
    uses: ./.github/workflows/ci.yml

  release:
    needs: ci
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Generate checksums
        run: |
          cd bin && shasum -a 256 vlt > ../checksums.txt
          cd ../completions && shasum -a 256 vlt.bash vlt.zsh >> ../checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          files: |
            bin/vlt
            completions/vlt.bash
            completions/vlt.zsh
            checksums.txt
